<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vero — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="admin.js" defer></script>
</head>
<body>

  <header class="admin-topbar">
    <span style="font-size:20px">🍕</span>
    <h1>Admin — Vero Pizzaria</h1>
    <a href="index.html" class="btn-admin-link" title="Voltar ao painel">← Painel</a>
  </header>

  <nav class="admin-tabs">
    <button class="admin-tab active" onclick="setTab('produtos', this)">🍕 Produtos</button>
    <button class="admin-tab" onclick="setTab('categorias', this)">📂 Categorias</button>
    <button class="admin-tab" onclick="setTab('configuracoes', this)">⚙️ Configurações</button>
  </nav>

  <div class="admin-body" id="adminBody">
    <div class="loading-state" id="loadingAdmin">
      <div class="loading-spinner"></div>
      <p>Carregando...</p>
    </div>
  </div>

  <!-- MODAL PRODUTO -->
  <div class="modal-overlay" id="produtoOverlay">
    <div class="modal" id="produtoModal">
      <h2 class="modal-title" id="modalTitle">Novo Produto</h2>

      <div class="foto-upload-area" id="fotoUploadArea" onclick="document.getElementById('fotoInput').click()">
        <img id="fotoPreviewImg" src="" alt="" hidden style="width:100%;max-height:180px;object-fit:cover;border-radius:8px">
        <div id="fotoPlaceholder">
          <div style="font-size:32px;margin-bottom:6px">📷</div>
          <div class="foto-placeholder-text">Clique para adicionar foto</div>
          <div class="foto-placeholder-text" style="font-size:11px;margin-top:2px">JPG, PNG · Máx 5MB</div>
        </div>
        <input type="file" id="fotoInput" accept="image/*" hidden>
      </div>

      <div class="form-group">
        <label class="form-label">Nome *</label>
        <input class="form-input" id="fNome" type="text" placeholder="Nome do produto">
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea class="form-textarea" id="fDesc" placeholder="Descreva de forma apetitosa..." rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Preço *</label>
          <input class="form-input" id="fPreco" type="number" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Preço original <small>(riscado)</small></label>
          <input class="form-input" id="fPrecoOrig" type="number" step="0.01" min="0" placeholder="0.00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria *</label>
        <select class="form-select" id="fCategoria"></select>
      </div>

      <div class="form-group">
        <label class="form-label">Tags</label>
        <div class="tags-grid">
          <button type="button" class="tag-toggle" data-tag="popular" onclick="toggleTag(this)">🔥 Popular</button>
          <button type="button" class="tag-toggle" data-tag="novo" onclick="toggleTag(this)">🆕 Novo</button>
          <button type="button" class="tag-toggle" data-tag="chef_indica" onclick="toggleTag(this)">⭐ Chef Indica</button>
          <button type="button" class="tag-toggle" data-tag="vegano" onclick="toggleTag(this)">🌱 Vegano</button>
          <button type="button" class="tag-toggle" data-tag="sem_gluten" onclick="toggleTag(this)">🌾 Sem Glúten</button>
          <button type="button" class="tag-toggle" data-tag="picante" onclick="toggleTag(this)">🌶️ Picante</button>
        </div>
      </div>

      <div class="toggle-row">
        <div class="toggle-row-info"><strong>Disponível</strong><small>Aparece no cardápio</small></div>
        <label class="toggle"><input type="checkbox" id="fDisponivel" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row" style="margin-bottom:20px">
        <div class="toggle-row-info"><strong>🌟 Destaque Hero</strong><small>Aparece na seção principal</small></div>
        <label class="toggle"><input type="checkbox" id="fHero"><span class="toggle-slider"></span></label>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" onclick="fecharModalProduto()">Cancelar</button>
        <button class="btn-primary" id="btnSalvarProduto" onclick="salvarProduto()" style="flex:2">Salvar Produto</button>
      </div>
    </div>
  </div>

  <!-- MODAL CATEGORIA -->
  <div class="modal-overlay" id="catOverlay">
    <div class="modal" id="catModal" style="max-width:400px">
      <h2 class="modal-title" id="catModalTitle">Nova Categoria</h2>
      <div class="form-group">
        <label class="form-label">Nome *</label>
        <input class="form-input" id="cNome" placeholder="Ex: Pizzas Especiais">
      </div>
      <div class="form-group">
        <label class="form-label">Ícone (emoji)</label>
        <input class="form-input" id="cIcone" placeholder="🍕" maxlength="4">
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input class="form-input" id="cDesc" placeholder="Subtítulo opcional">
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="fecharModalCat()">Cancelar</button>
        <button class="btn-primary" onclick="salvarCategoria()" style="flex:2">Salvar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

</body>
</html>
